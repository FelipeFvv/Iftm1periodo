<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
  
    <form>
            <label for="nome">
                Nome:
            </label>
                    <input type="text" id="nome" placeholder="Digite o Seu nome">
                   <br>
                    <label>Sexo:</label>
                    <input type="radio" name="sexo" value="M" id="masculino">
                    <label for="masculino">Masculino</label>
                    
                    <input type="radio" name="sexo" value="F" id="feminino">
                    <label for="feminino">Feminino</label>
                    <br>
                  
                    <label for="Estado civil">
                        Estado Civil
                    </label>
                    <select name="estado_civil">
                        <option value="solteiro">Solteiro</option>
                        <option value="casado">Casado</option>
                        <option value="viuvo">Viúvo</option>
                        <option value="divorciado">Divorciado</option>
                        <option value="outro">Outro</option>
                      </select>
                      <br>
                      <label for="email">
                        Email:
                    </label>
                            <input type="email" id="email" placeholder="Digite o Email">
                        <br>
                            <label for="endereco">
                                Endereço:
                            </label>
                                    <input type="text" id="Enderço" placeholder="Digite o Endereço">
                                    <br>
                  
                                    <label for="numero">Número:</label>
                                    <input type="number" id="numero" name="numero" min="1" max="10">
                                            <br>
                                         
                                            <label for="date">
                                                Data de nascimento:
                                            </label>
                                                    <input type="date">
                                                    <br>
                                                    <label for="phone"> Telefone:</label>
                                                    <input type="phone" id="phone" name="phone">

                                                    <br>
                                                    <button type="button">Enviar</button>
                                                    <button type="submit">Limpar</button>

                      

    </form>
    
</body>
</html>
